<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Popcorn OS</title> <style> * { box-sizing: border-box; margin:0; padding:0; font-family: Arial,sans-serif; user-select: none; } body { width:100vw; height:100vh; overflow:hidden; background:#1e293b; cursor: url('./Cursor.png') 16 16, auto; } #desktop { position: relative; width: 100%; height: calc(100% - 52px); overflow: hidden; } .icon { width: 90px; text-align:center; color:white; position:absolute; cursor: grab; padding:10px; border-radius:12px; } .icon:hover { background: rgba(255,255,255,0.12); } #taskbar { position: fixed; bottom:0; width:100%; height:52px; background:rgba(15,15,15,0.82); display:flex; align-items:center; gap:10px; padding:0 10px; } .taskbar-btn { background: rgba(255,255,255,0.1); border:none; color:white; padding:10px; border-radius:12px; cursor:pointer; } #clock { margin-left:auto; color:white; } /* WINDOW */ .window { position:absolute; width:750px; height:500px; background:#181818; border-radius:18px; overflow:hidden; min-width:320px; min-height:220px; } .titlebar { height:42px; background:#222; display:flex; align-items:center; justify-content:space-between; padding:0 12px; cursor:move; color:white; } .window-content { height:calc(100% - 42px); background:#111; color:white; } /* RESIZE HANDLES */ .resize-handle { position:absolute; } .resize-right { right:0; top:0; width:6px; height:100%; cursor: ew-resize; } .resize-left { left:0; top:0; width:6px; height:100%; cursor: ew-resize; } .resize-bottom { bottom:0; left:0; width:100%; height:6px; cursor: ns-resize; } .resize-top { top:0; left:0; width:100%; height:6px; cursor: ns-resize; } .resize-br { right:0; bottom:0; width:12px; height:12px; cursor: nwse-resize; } .resize-bl { left:0; bottom:0; width:12px; height:12px; cursor: nesw-resize; } .resize-tr { right:0; top:0; width:12px; height:12px; cursor: nesw-resize; } .resize-tl { left:0; top:0; width:12px; height:12px; cursor: nwse-resize; } iframe { width:100%; height:100%; border:none; background:white; } </style> </head> <body> <div id="desktop"></div> <div id="taskbar"> <button class="taskbar-btn" onclick="openStore()">🍿 Store</button> <button class="taskbar-btn" onclick="openNotes()">📝 Notes</button> <div id="clock"></div> </div> <script> const desktop = document.getElementById("desktop"); let zIndexCounter = 100; /* CLOCK */ setInterval(()=>{ const now=new Date(); document.getElementById("clock").textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); },1000); /* ICONS */ const apps = [ {id:"store", name:"Store", x:20, y:20}, {id:"notes", name:"Notes", x:20, y:120} ]; function renderIcons(){ desktop.innerHTML=""; apps.forEach(app=>{ const icon=document.createElement("div"); icon.className="icon"; icon.style.left=app.x+"px"; icon.style.top=app.y+"px"; icon.innerHTML=app.name; icon.ondblclick=()=>{ if(app.id==="store") openStore(); if(app.id==="notes") openNotes(); }; desktop.appendChild(icon); }); } renderIcons(); /* WINDOW */ function createWindow(title, content){ const win=document.createElement("div"); win.className="window"; win.style.left="200px"; win.style.top="120px"; win.style.zIndex=++zIndexCounter; win.innerHTML= <div class="titlebar">${title}<button onclick="this.closest('.window').remove()">✕</button></div> <div class="window-content">${content}</div> <div class="resize-handle resize-right"></div> <div class="resize-handle resize-left"></div> <div class="resize-handle resize-bottom"></div> <div class="resize-handle resize-top"></div> <div class="resize-handle resize-br"></div> <div class="resize-handle resize-bl"></div> <div class="resize-handle resize-tr"></div> <div class="resize-handle resize-tl"></div> ; desktop.appendChild(win); makeDraggable(win); makeResizable(win); } /* DRAG */ function makeDraggable(win){ const bar=win.querySelector(".titlebar"); let dragging=false, ox, oy; bar.onmousedown=e=>{ dragging=true; ox=e.clientX-win.offsetLeft; oy=e.clientY-win.offsetTop; }; document.onmousemove=e=>{ if(!dragging) return; win.style.left=(e.clientX-ox)+"px"; win.style.top=(e.clientY-oy)+"px"; }; document.onmouseup=()=>dragging=false; } /* RESIZE */ function makeResizable(win){ const handles=win.querySelectorAll(".resize-handle"); handles.forEach(h=>{ h.onmousedown=e=>{ e.stopPropagation(); let startX=e.clientX; let startY=e.clientY; let w=win.offsetWidth; let hgt=win.offsetHeight; let l=win.offsetLeft; let t=win.offsetTop; function move(e){ let dx=e.clientX-startX; let dy=e.clientY-startY; if(h.classList.contains("resize-right")) win.style.width=w+dx+"px"; if(h.classList.contains("resize-bottom")) win.style.height=hgt+dy+"px"; if(h.classList.contains("resize-left")){ win.style.width=w-dx+"px"; win.style.left=l+dx+"px"; } if(h.classList.contains("resize-top")){ win.style.height=hgt-dy+"px"; win.style.top=t+dy+"px"; } if(h.classList.contains("resize-br")){ win.style.width=w+dx+"px"; win.style.height=hgt+dy+"px"; } } document.addEventListener("mousemove",move); document.addEventListener("mouseup",()=>{ document.removeEventListener("mousemove",move); },{once:true}); }; }); } /* APPS */ function openStore(){ createWindow("Store","App store coming soon"); } function openNotes(){ createWindow("Notes","<textarea style='width:100%;height:100%'></textarea>"); } </script> </body> </html>
